spring.application.name=MyRecipes

# H2 Database (file-based, persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/myrecipes
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa
spring.jpa.hibernate.ddl-auto=update

# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true

# JWT
jwt.secret=myrecipes-secret-key-change-this-in-production-min-32-chars

# File uploads
upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
spring.web.resources.static-locations=classpath:/static/,file:./uploads/
